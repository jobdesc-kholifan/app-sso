<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile App Experience - Vibe UI Kit</title>
    <script src="../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../dist/css/theme.css">
    <link rel="stylesheet" href="../dist/css/layout.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <script>
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body class="bg-body text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 antialiased overflow-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    
    <div id="app-layout" class="flex w-full h-screen overflow-hidden transition-all duration-500 bg-body">
        <!-- Overlay Layer for Mobile -->
        <div id="sidebar-overlay"
            class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0">
        </div>

        <!-- Sidebar (Drawer on Mobile) -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-64 border-r transition-all duration-300 transform -translate-x-full md:translate-x-0 md:relative flex flex-col flex-shrink-0 lg:translate-x-0">
            <div class="flex flex-col h-full w-full">
                <div id="profile-container" class="pt-8 pb-4 px-6 flex flex-col transition-all duration-500">
                    <div class="relative w-16 h-16 mb-4">
                        <img id="side-avatar" src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff"
                            class="w-16 h-16 rounded-2xl shadow-lg border-2 border-white/20"
                            style="background-color: rgb(var(--color-primary))" alt="side-avatar">
                    </div>
                    <div class="sidebar-hide">
                        <span class="block text-lg font-bold">Administrator</span>
                        <span class="block text-xs text-muted font-medium uppercase tracking-wider">Super Admin</span>
                    </div>
                </div>

                <nav id="sidebar-nav" class="flex-1 px-3 py-2 space-y-1 overflow-y-auto">
                    <!-- Menu generated by JS -->
                </nav>

                <div class="p-4 border-t" style="border-color: rgb(var(--color-border))">
                    <button class="w-full flex items-center justify-start px-4 py-3 text-sm font-bold bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl hover:bg-slate-200 transition" id="logout-btn">
                        <i class="bx bx-log-out mr-3 text-lg"></i>
                        <span>Log Out</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div id="content-wrapper" class="flex flex-col flex-1 min-w-0 overflow-hidden relative">
            
            <!-- Mobile App Header -->
            <header id="app-header" class="h-20 flex items-center justify-between px-6 sticky top-0 z-30 bg-body/80 backdrop-blur-lg border-b border-transparent">
                <div class="flex items-center gap-4">
                    <button id="mobile-sidebar-toggle" class="p-2.5 rounded-xl bg-surface border shadow-sm text-slate-600 dark:text-slate-300">
                        <i class="bx bx-grid-alt text-xl"></i>
                    </button>
                    <div>
                        <span class="block text-[10px] font-bold text-muted uppercase tracking-widest">Welcome back</span>
                        <span class="block text-sm font-extrabold tracking-tight">Vibe Dashboard</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="p-2.5 rounded-xl bg-surface border shadow-sm">
                        <i id="theme-toggle-dark-icon" class="bx bx-moon text-xl hidden"></i>
                        <i id="theme-toggle-light-icon" class="bx bx-sun text-xl hidden"></i>
                    </button>
                    <div class="w-10 h-10 rounded-xl bg-primary-600 flex items-center justify-center text-white shadow-lg overflow-hidden border-2 border-white/20">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" class="w-full h-full object-cover">
                    </div>
                </div>
            </header>

            <!-- Scrollable Content -->
            <main id="main-content" class="flex-1 overflow-y-auto w-full pb-32">
                <div class="p-6 space-y-8">
                    
                    <!-- Search Bar (App Style) -->
                    <div class="relative group">
                        <i class="bx bx-search absolute left-4 top-1/2 -translate-y-1/2 text-xl text-muted group-focus-within:text-primary-600 transition-colors"></i>
                        <input type="text" placeholder="Search data, reports, or users..." 
                            class="w-full h-14 pl-12 pr-4 bg-surface border rounded-2xl focus:outline-none focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 transition-all font-medium">
                    </div>

                    <!-- Quick Action Chips -->
                    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                        <button class="px-5 py-2.5 bg-primary-600 text-white rounded-full text-xs font-bold shadow-lg shadow-primary-600/20 whitespace-nowrap">Overview</button>
                        <button class="px-5 py-2.5 bg-surface border text-muted rounded-full text-xs font-bold whitespace-nowrap">Transactions</button>
                        <button class="px-5 py-2.5 bg-surface border text-muted rounded-full text-xs font-bold whitespace-nowrap">Inventory</button>
                        <button class="px-5 py-2.5 bg-surface border text-muted rounded-full text-xs font-bold whitespace-nowrap">Invoices</button>
                    </div>

                    <!-- App Cards Grid -->
                    <section>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-5 bg-surface rounded-[2rem] border shadow-sm flex flex-col justify-between aspect-square">
                                <div class="w-12 h-12 rounded-2xl bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600">
                                    <i class="bx bx-trending-up text-2xl"></i>
                                </div>
                                <div>
                                    <span class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-1">Revenue</span>
                                    <span class="text-xl font-black">Rp 12.5M</span>
                                </div>
                            </div>
                            <div class="p-5 bg-surface rounded-[2rem] border shadow-sm flex flex-col justify-between aspect-square">
                                <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600">
                                    <i class="bx bx-cart text-2xl"></i>
                                </div>
                                <div>
                                    <span class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-1">Orders</span>
                                    <span class="text-xl font-black">2.4k</span>
                                </div>
                            </div>
                            <div class="p-5 bg-surface rounded-[2rem] border shadow-sm flex flex-col justify-between aspect-square">
                                <div class="w-12 h-12 rounded-2xl bg-amber-50 dark:bg-amber-900/30 flex items-center justify-center text-amber-600">
                                    <i class="bx bx-group text-2xl"></i>
                                </div>
                                <div>
                                    <span class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-1">Customers</span>
                                    <span class="text-xl font-black">840</span>
                                </div>
                            </div>
                            <div class="p-5 bg-surface rounded-[2rem] border shadow-sm flex flex-col justify-between aspect-square">
                                <div class="w-12 h-12 rounded-2xl bg-rose-50 dark:bg-rose-900/30 flex items-center justify-center text-rose-600">
                                    <i class="bx bx-error-circle text-2xl"></i>
                                </div>
                                <div>
                                    <span class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-1">Issues</span>
                                    <span class="text-xl font-black">12</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Recent Activity (List View) -->
                    <section>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-sm font-black uppercase tracking-widest">Recent Activity</h2>
                            <button class="text-xs font-bold text-primary-600">View All</button>
                        </div>
                        <div class="space-y-3">
                            <div class="p-4 bg-surface rounded-3xl border flex items-center gap-4 transition-transform active:scale-95">
                                <div class="w-12 h-12 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center border text-xl">
                                    📦
                                </div>
                                <div class="flex-1">
                                    <span class="block text-sm font-bold tracking-tight">New Order #8272</span>
                                    <span class="block text-[10px] text-muted font-medium">2 minutes ago • Processing</span>
                                </div>
                                <i class="bx bx-chevron-right text-muted text-xl"></i>
                            </div>
                            <div class="p-4 bg-surface rounded-3xl border flex items-center gap-4 transition-transform active:scale-95">
                                <div class="w-12 h-12 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center border text-xl">
                                    👤
                                </div>
                                <div class="flex-1">
                                    <span class="block text-sm font-bold tracking-tight">Customer Registered</span>
                                    <span class="block text-[10px] text-muted font-medium">1 hour ago • Verified</span>
                                </div>
                                <i class="bx bx-chevron-right text-muted text-xl"></i>
                            </div>
                            <div class="p-4 bg-surface rounded-3xl border flex items-center gap-4 transition-transform active:scale-95">
                                <div class="w-12 h-12 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center border text-xl">
                                    💰
                                </div>
                                <div class="flex-1">
                                    <span class="block text-sm font-bold tracking-tight">Payment Received</span>
                                    <span class="block text-[10px] text-muted font-medium">3 hours ago • Rp. 5.4M</span>
                                </div>
                                <i class="bx bx-chevron-right text-muted text-xl"></i>
                            </div>
                        </div>
                    </section>
                </div>
            </main>

            <!-- Sticky Bottom Navigation -->
            <nav class="mobile-bottom-nav">
                <a href="#" class="mobile-bottom-item active">
                    <i class="bx bxs-home-alt-2"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="mobile-bottom-item">
                    <i class="bx bx-bar-chart-square"></i>
                    <span>Stats</span>
                </a>
                <div class="w-14 h-14 bg-primary-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-primary-600/30 -mt-8 border-4 border-body">
                    <i class="bx bx-plus text-3xl"></i>
                </div>
                <a href="#" class="mobile-bottom-item">
                    <i class="bx bx-bell"></i>
                    <span>Alerts</span>
                </a>
                <a href="#" class="mobile-bottom-item">
                    <i class="bx bx-user-circle"></i>
                    <span>Profile</span>
                </a>
            </nav>

        </div>
    </div>

    <!-- Core Scripts -->
    <script src="../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../dist/js/config.js"></script>
    <script src="../dist/js/menu.js"></script>
    <script src="../dist/js/app.js"></script>

</body>

</html>
