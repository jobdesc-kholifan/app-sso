<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Blank Page - Vibe UI Kit</title>
	<script src="../dist/js/vendor/tailwindcss.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="../dist/css/boxicons.min.css" rel="stylesheet">
	<script src="../dist/js/tailwind-config.js"></script>
	<link rel="stylesheet" href="../dist/css/theme.css">
	<link rel="stylesheet" href="../dist/css/layout.css">
	<link rel="stylesheet" href="../dist/css/components.css">
	<script>
		if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
			document.documentElement.classList.add('dark');
		} else {
			document.documentElement.classList.remove('dark')
		}
	</script>

	<style id="critical-loader-style">
		#app-loader {
			position: fixed;
			inset: 0;
			z-index: 99999;
			background: #f8fafc;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
		}

		.dark #app-loader {
			background: #0b1120;
		}

		.loader-spinner {
			width: 48px;
			height: 48px;
			border: 3px solid rgba(79, 70, 229, 0.1);
			border-top-color: #4f46e5;
			border-radius: 50%;
			animation: spin 1s linear infinite;
			margin-bottom: 1.5rem;
		}

		@keyframes spin {
			from {
				transform: rotate(0deg);
			}

			to {
				transform: rotate(360deg);
			}
		}

		#app-loader.fade-out {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
			transform: scale(1.05);
		}
	</style>
</head>

<body class="bg-body text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">
	<div id="app-loader">
		<div class="loader-spinner"></div>
	</div>

	<div id="app-layout" class="flex w-full h-screen overflow-hidden transition-all duration-500 bg-body">
		<!-- Overlay Layer for Mobile -->
		<div id="sidebar-overlay"
			class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0">
		</div>

		<aside id="sidebar"
			class="fixed inset-y-0 left-0 z-50 w-64 border-r transition-all duration-300 transform -translate-x-full md:translate-x-0 md:relative flex flex-col flex-shrink-0 lg:translate-x-0">
			<div class="flex flex-col h-full w-full">
				<!-- Floating Sidebar Toggle (Desktop) -->
				<button id="desktop-sidebar-toggle"
					class="hidden md:flex absolute -right-3 top-6 w-6 h-6 bg-primary-600 text-white rounded-full items-center justify-center shadow-lg transition-all hover:scale-110 z-[60] focus:outline-none">
					<i id="toggle-icon" class="bx bx-chevron-left text-lg"></i>
				</button>
				<div id="profile-container"
					class="pt-4 pb-2 px-6 flex flex-row items-center transition-all duration-500">
					<div class="relative w-max h-auto group flex-shrink-0">
						<img id="side-avatar" src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff"
							class="w-12 h-12 rounded-full shadow-lg transition-all duration-500 border-2 border-white/20"
							style="background-color: rgb(var(--color-primary))" alt="side-avatar">
						<div class="absolute -left-1 -top-1 sidebar-hide">
							<button
								class="bg-amber-500 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg hover:bg-amber-600 transition border-2 border-white">
								<i class="bx bx-edit-alt text-xs"></i>
							</button>
						</div>
					</div>
					<div class="ml-4 sidebar-hide overflow-hidden whitespace-nowrap transition-all duration-300">
						<span class="block text-sm font-bold text-muted/80">Administrator</span>
						<span class="block text-[11px] text-muted/60 font-medium uppercase tracking-tight">Super
							Admin</span>
					</div>
				</div>
				<nav id="sidebar-nav" class="flex-1 px-3 py-2 space-y-1 overflow-y-auto pt-8"></nav>
			</div>
		</aside>

		<div id="content-wrapper" class="flex flex-col flex-1 min-w-0 overflow-hidden">
			<header id="app-header"
				class="h-16 flex items-center justify-between px-8 border-b sticky top-0 z-30 transition-all duration-500 bg-surface">
				<div class="flex items-center">
					<button id="mobile-sidebar-toggle"
						class="md:hidden mr-4 p-2 rounded-lg text-muted hover:bg-slate-100 dark:hover:bg-slate-800">
						<i class="bx bx-menu text-2xl"></i>
					</button>
					<h1 class="text-sm font-bold flex items-center">
						<i class="bx bx-circle mr-2 text-primary-600"></i> Utility / Blank Page
					</h1>
				</div>
				<div class="flex items-center gap-2">
					<button id="theme-toggle"
						class="flex items-center justify-center w-9 h-9 rounded-lg text-muted hover:bg-slate-200 dark:hover:bg-slate-700 transition-all focus:outline-none border shadow-sm"
						style="background-color: rgb(var(--color-bg-alt)); border-color: rgb(var(--color-border))">
						<i id="theme-toggle-dark-icon" class="bx bx-moon text-xl hidden"></i>
						<i id="theme-toggle-light-icon" class="bx bx-sun text-xl hidden"></i>
					</button>
					<button id="settings-toggle"
						class="flex items-center justify-center w-9 h-9 rounded-lg text-muted hover:bg-slate-200 dark:hover:bg-slate-700 transition-all focus:outline-none border shadow-sm"
						style="background-color: rgb(var(--color-bg-alt)); border-color: rgb(var(--color-border))">
						<i class="bx bx-cog text-xl"></i>
					</button>
					<div class="dropdown">
						<button class="btn btn-default dropdown-toggle p-2">
							<div class="flex items-center gap-2">
								<img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff"
									class="w-6 h-6 rounded-full">
								<span class="text-sm font-semibold">Admin</span>
								<i class="bx bx-chevron-down"></i>
							</div>
						</button>
						<div class="dropdown-menu min-w-[240px]">
							<div class="px-4 py-3 flex items-center gap-3">
								<img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff"
									class="w-10 h-10 rounded-full" alt="Avatar">
								<div class="flex flex-col min-w-0">
									<span class="text-sm font-bold truncate">Administrator</span>
									<span class="text-xs text-muted truncate">admin@vibeui.com</span>
								</div>
							</div>
							<div class="dropdown-divider"></div>
							<a href="#" class="dropdown-item"><i class="bx bx-user mr-2"></i> My Profile</a>
							<a href="#" class="dropdown-item"><i class="bx bx-cog mr-2"></i> Account
								Settings</a>
							<div class="dropdown-divider"></div>
							<a href="#" class="dropdown-item text-danger"><i class="bx bx-log-out mr-2"></i>
								Sign Out</a>
						</div>
					</div>
				</div>
			</header>

			<main id="main-content" class="flex-1 overflow-y-auto w-full space-y-8 transition-all duration-500">
				<div id="main-canvas" class="w-full space-y-8 transition-all duration-500 p-6">
					<div class="mb-8">
						<h2 class="text-3xl font-extrabold mb-2">Blank Page</h2>
						<p class="text-muted font-medium">Start your new project from here.</p>
					</div>

					<div
						class="h-[60vh] border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-[2rem] flex flex-col items-center justify-center text-center p-8">
						<div class="w-16 h-16 rounded-2xl bg-alt flex items-center justify-center text-muted mb-6">
							<i class="bx bx-plus text-3xl"></i>
						</div>
						<h4 class="text-xl font-black mb-2 italic text-slate-400">Your content goes here...</h4>
						<p class="text-sm text-slate-400 max-w-sm font-medium">This is a clean container to help you
							start building unique sections for your application.</p>
					</div>
				</div>
			</main>
		</div>
	</div>

	<!-- Vendor Scripts -->
	<script src="../dist/js/vendor/floating-ui.core.min.js"></script>
	<script src="../dist/js/vendor/floating-ui.dom.min.js"></script>
	<script src="../dist/js/config.js"></script>
	<script src="../dist/js/menu.js"></script>
	<script src="../dist/js/app.js"></script>
</body>

</html>
