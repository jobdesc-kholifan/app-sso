<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found - Vibe UI Kit</title>
    <script src="../../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../../dist/css/theme.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <script>
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <style id="critical-loader-style">
        #app-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        .dark #app-loader { background: #0b1120; }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
    </style>
</head>

<body class="bg-body text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 antialiased overflow-x-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-xl animate-in fade-in zoom-in duration-700">
            <img src="../../dist/images/error_404_illustration_1776397724514.png" class="w-full max-w-md mx-auto mb-12 drop-shadow-2xl" alt="404 Illustration">
            
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 dark:text-white tracking-tighter mb-6">404</h1>
            <h2 class="text-2xl md:text-3xl font-bold mb-4">Whoops! You're lost in space.</h2>
            <p class="text-lg text-muted font-medium mb-12 max-w-md mx-auto">The page you're looking for doesn't exist or has been moved to a different nebula.</p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="../../dashboards/index.html" class="btn btn-primary btn-lg px-10 rounded-full font-black shadow-xl shadow-primary-600/30">
                    <i class="bx bx-home-alt mr-2 text-xl"></i> Back to Home
                </a>
                <button onclick="history.back()" class="btn btn-default btn-lg px-10 rounded-full font-black">
                    <i class="bx bx-arrow-back mr-2 text-xl"></i> Go Back
                </button>
            </div>
        </div>

        <!-- Footer Links -->
        <div class="mt-20 flex gap-8 text-xs font-black uppercase tracking-widest text-muted">
            <a href="../page-faq.html" class="hover:text-primary-600">Help Center</a>
            <a href="#" class="hover:text-primary-600">Report Issue</a>
            <a href="#" class="hover:text-primary-600">System Status</a>
        </div>
    </div>

    <!-- Vendor Scripts -->
    <script src="../../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../../dist/js/app.js"></script>
</body>
</html>
