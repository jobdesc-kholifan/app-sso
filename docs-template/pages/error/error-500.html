<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error - Vibe UI Kit</title>
    <script src="../../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../../dist/css/theme.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <script>
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <style id="critical-loader-style">
        #app-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        .dark #app-loader { background: #0b1120; }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
    </style>
</head>

<body class="bg-body text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 antialiased overflow-x-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-xl animate-in fade-in slide-in-from-bottom duration-700">
             <div class="mb-12 relative inline-flex">
                 <div class="absolute inset-0 bg-danger-600 rounded-full blur-3xl opacity-20"></div>
                 <i class="bx bx-server text-[160px] text-danger-600 drop-shadow-2xl"></i>
                 <i class="bx bx-error-alt absolute -top-4 -right-4 text-6xl text-danger-500 animate-pulse"></i>
             </div>
            
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 dark:text-white tracking-tighter mb-6">500</h1>
            <h2 class="text-2xl md:text-3xl font-bold mb-4">Internal Server Error</h2>
            <p class="text-lg text-muted font-medium mb-12 max-w-md mx-auto">Our servers are having a bit of a meltdown. We're already working on fixing the issue.</p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="../../dashboards/index.html" class="btn btn-primary btn-lg px-10 rounded-full font-black shadow-xl shadow-primary-600/30">
                    <i class="bx bx-refresh mr-2 text-xl"></i> Try Refreshing
                </a>
                <a href="../page-faq.html" class="btn btn-default btn-lg px-10 rounded-full font-black">
                    <i class="bx bx-support mr-2 text-xl"></i> Contact Support
                </a>
            </div>
        </div>
    </div>

    <!-- Vendor Scripts -->
    <script src="../../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../../dist/js/app.js"></script>
</body>
</html>
