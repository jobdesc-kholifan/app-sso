<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Vibe UI Kit</title>
    <script src="../../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../../dist/css/theme.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <script>
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        .auth-bg-overlay {
            background-image: url('../../dist/images/auth_bg_abstract_1776397340943.png');
            background-size: cover;
            background-position: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>

    <style id="critical-loader-style">
        #app-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        .dark #app-loader { background: #0b1120; }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
    </style>
</head>

<body class="font-sans antialiased overflow-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="auth-bg-overlay fixed inset-0 z-0"></div>

    <div class="relative z-10 min-h-screen flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-[420px] p-8 md:p-10 rounded-[2rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-warning-600/10 text-warning-600 mb-6 group transition-transform hover:scale-110">
                <i class="bx bx-key text-4xl"></i>
            </div>
            
            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Forgot Password?</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-3 font-medium mb-8">No worries! Just enter your email and we'll send you a link to reset your password.</p>

            <form action="auth-login-v1.html" class="space-y-6 text-left">
                <div>
                    <label class="form-label mb-2 block">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="bx bx-envelope"></i>
                        <input type="email" class="form-control h-12" placeholder="admin@example.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg shadow-primary-600/30">
                    Send Reset Link
                </button>
            </form>

            <p class="mt-8 text-sm font-bold text-slate-500 dark:text-slate-400">
                Wait, I remember my password...
                <br>
                <a href="auth-login-v1.html" class="text-primary-600 font-extrabold hover:underline flex items-center justify-center mt-2 group">
                    <i class="bx bx-left-arrow-alt mr-1 text-xl group-hover:-translate-x-1 transition-transform"></i> Back to Login
                </a>
            </p>
        </div>
    </div>

    <!-- Theme Switcher Floating -->
    <div class="fixed bottom-6 right-6 z-50">
        <button id="theme-toggle" class="flex items-center justify-center w-12 h-12 rounded-full glass-card text-slate-600 dark:text-slate-300 shadow-xl border border-white/20 transition-all hover:scale-110">
            <i id="theme-toggle-dark-icon" class="bx bx-moon text-xl hidden"></i>
            <i id="theme-toggle-light-icon" class="bx bx-sun text-xl hidden"></i>
        </button>
    </div>

    <!-- Vendor Scripts -->
    <script src="../../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../../dist/js/app.js"></script>
</body>
</html>
