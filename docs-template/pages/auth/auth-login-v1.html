<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login v1 - Vibe UI Kit</title>
    <script src="../../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../../dist/css/theme.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <script>
        // Inline theme check to prevent flash
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        body {
            background-image: url('../../dist/img/auth_bg.webp'); /* Fallback or relative path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Using the generated image path dynamically if possible, but for now using a placeholder or local reference */
        .auth-bg-overlay {
            background-image: url('../../dist/images/auth_bg_abstract_1776397340943.png');
            background-size: cover;
            background-position: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dark .auth-bg-overlay {
            filter: brightness(0.25) saturate(0.6);
            background-color: #020617;
        }
    </style>

    <style id="critical-loader-style">
        #app-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        .dark #app-loader { background: #0b1120; }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
    </style>
</head>

<body class="font-sans antialiased overflow-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="auth-bg-overlay fixed inset-0 z-0"></div>

    <div class="relative z-10 min-h-screen flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-[420px] p-8 md:p-10 rounded-[2rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-600/10 text-primary-600 mb-6 group transition-transform hover:scale-110">
                    <i class="bx bxs-rocket text-4xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Welcome Back!</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Log in to your dashboard to continue</p>
            </div>

            <form action="../../dashboards/index.html" class="space-y-6">
                <div>
                    <label class="form-label mb-2 block">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="bx bx-envelope"></i>
                        <input type="email" class="form-control" placeholder="admin@example.com" required>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="form-label">Password</label>
                        <a href="auth-forgot-password.html" class="text-xs font-bold text-primary-600 hover:underline">Forgot password?</a>
                    </div>
                    <div class="input-icon-wrapper">
                        <i class="bx bx-lock-alt"></i>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center">
                    <label class="form-check flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="form-check-input">
                        <span class="text-sm font-semibold text-slate-600 dark:text-slate-400 group-hover:text-primary-600 transition-colors">Remember me for 30 days</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg shadow-primary-600/30">
                    Log In Now
                </button>
            </form>

            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-200 dark:border-slate-700/50"></span></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-transparent px-4 text-slate-400 font-bold tracking-widest">Or continue with</span></div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-4">
                    <button class="btn btn-default py-3">
                        <i class="bx bxl-google text-xl text-red-500"></i>
                        <span class="font-bold">Google</span>
                    </button>
                    <button class="btn btn-default py-3">
                        <i class="bx bxl-github text-xl text-slate-900 dark:text-white"></i>
                        <span class="font-bold">GitHub</span>
                    </button>
                </div>
            </div>

            <p class="mt-10 text-center text-sm font-semibold text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a href="auth-register-v1.html" class="text-primary-600 font-extrabold hover:underline">Sign up now</a>
            </p>
        </div>
    </div>

    <!-- Theme Switcher Floating (Optional for Auth Pages) -->
    <div class="fixed bottom-6 right-6 z-50">
        <button id="theme-toggle" class="flex items-center justify-center w-12 h-12 rounded-full glass-card text-slate-600 dark:text-slate-300 shadow-xl border border-white/20 transition-all hover:scale-110">
            <i id="theme-toggle-dark-icon" class="bx bx-moon text-xl hidden"></i>
            <i id="theme-toggle-light-icon" class="bx bx-sun text-xl hidden"></i>
        </button>
    </div>

    <!-- Vendor Scripts -->
    <script src="../../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../../dist/js/app.js"></script>
</body>
</html>
