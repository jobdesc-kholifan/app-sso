<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - Vibe UI Kit</title>
    <script src="../dist/js/vendor/tailwindcss.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../dist/css/boxicons.min.css" rel="stylesheet">
    <script src="../dist/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../dist/css/theme.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <script>
        if (localStorage.getItem('vibe-template.color-theme') === 'dark' || (!('vibe-template.color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <style id="critical-loader-style">
        #app-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        .dark #app-loader { background: #0b1120; }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #app-loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); }
    </style>
</head>

<body class="bg-body text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 antialiased overflow-x-hidden">
    <div id="app-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="h-screen overflow-hidden flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-2xl animate-in fade-in zoom-in duration-1000">
             <div class="mb-12 inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-primary-600 text-white shadow-2xl shadow-primary-600/40 animate-bounce">
                 <i class="bx bx-wrench text-5xl"></i>
             </div>
            
            <h1 class="text-5xl md:text-7xl font-black text-slate-900 dark:text-white tracking-tighter mb-6 uppercase">Under Maintenance</h1>
            <p class="text-xl text-muted font-medium mb-12 max-w-lg mx-auto leading-relaxed">We're currently performing scheduled maintenance to improve our systems. We'll be back online shortly!</p>
            
            <div class="card p-8 md:p-10 mb-12 max-w-md mx-auto border-2 border-dashed border-primary-600/30">
                 <div class="flex items-center justify-between mb-4">
                     <span class="text-xs font-black uppercase tracking-widest text-primary-600">Maintenance Progress</span>
                     <span class="text-xs font-black text-primary-600">85%</span>
                 </div>
                 <div class="progress progress-md h-3 rounded-full overflow-hidden mb-6">
                     <div class="progress-bar w-[85%]"></div>
                 </div>
                 <p class="text-[10px] font-bold text-muted uppercase tracking-[0.2em]">Estimated Completion: <span class="text-slate-900 dark:text-white">60 Minutes</span></p>
            </div>

            <div class="flex items-center justify-center gap-6">
                <a href="#" class="text-slate-400 hover:text-primary-600 transition-colors"><i class="bx bxl-twitter text-2xl"></i></a>
                <a href="#" class="text-slate-400 hover:text-primary-600 transition-colors"><i class="bx bxl-facebook text-2xl"></i></a>
                <a href="#" class="text-slate-400 hover:text-primary-600 transition-colors"><i class="bx bx-envelope text-2xl"></i></a>
            </div>
        </div>
    </div>

    <!-- Vendor Scripts -->
    <script src="../dist/js/vendor/floating-ui.core.min.js"></script>
    <script src="../dist/js/vendor/floating-ui.dom.min.js"></script>
    <script src="../dist/js/app.js"></script>
</body>
</html>
