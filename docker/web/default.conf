server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html index.htm;

    charset utf-8;

    # Mengarahkan semua request ke index.php agar routing CodeIgniter 4 berjalan mulus
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Penanganan file statis dan pencegahan logging berlebihan
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Blokir akses ke file sensitif (.env, .git, dll)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Teruskan script PHP ke container appsso_app (PHP-FPM)
    location ~ \.php$ {
        fastcgi_pass appsso_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Pengaturan buffer untuk performa dan muatan file besar
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Logging berkas
    error_log  /var/log/nginx/error.log error;
    access_log /var/log/nginx/access.log;
}
